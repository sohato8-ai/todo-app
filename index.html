<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.header {
  padding: 20px;
  font-size: 22px;
  color: white;
}

.tabs {
  display: flex;
  margin: 10px;
}

.tabs button {
  flex:1;
  padding:12px;
  border:none;
  background:white;
  border-radius:10px;
  margin:4px;
}

.active {
  background:#000;
  color:white;
}

.container {
  padding: 12px;
}

.card {
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;

  white-space: normal;
  word-break: break-word;
}

.rankA { border-left:6px solid #ff3b30; }
.rankB { border-left:6px solid #ff9500; }
.rankC { border-left:6px solid #007aff; }

.badge {
  font-size:12px;
  background:#eee;
  padding:4px 8px;
  border-radius:8px;
}

.bubbleArea {
  position:relative;
  height:420px;
}

.bubble {
  position:absolute;
  border-radius:50%;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6px;
  font-weight:bold;
  word-break:break-word;
}

.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:black;
  color:white;
  border-radius:50%;
  font-size:28px;
  text-align:center;
  line-height:60px;
}
</style>
</head>

<body>

<div class="header">Todo</div>

<div class="tabs">
  <button id="btnActive" onclick="setMode('active')" class="active">未完了</button>
  <button id="btnDone" onclick="setMode('done')">完了</button>
</div>

<div class="container">
  <div id="bubbleArea" class="bubbleArea"></div>
  <div id="list"></div>
</div>

<div class="fab" onclick="addTask()">＋</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let mode = "active";

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function setMode(m){
  mode = m;
  document.getElementById("btnActive").classList.toggle("active", m==="active");
  document.getElementById("btnDone").classList.toggle("active", m==="done");
  render();
}

function addTask(){
  let text = prompt("タスク名");
  if(!text) return;
  let rank = prompt("ランク A/B/C") || "";
  let deadline = prompt("期限 YYYY-MM-DD") || "";

  tasks.push({id:Date.now(), text, rank, deadline, done:false});
  save(); render();
}

function toggle(id){
  tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
  save(); render();
}

function del(id){
  tasks = tasks.filter(t => t.id!==id);
  save(); render();
}

function edit(t){
  let text = prompt("タスク名", t.text);
  let rank = prompt("ランク", t.rank);
  let deadline = prompt("期限", t.deadline);

  tasks = tasks.map(x => x.id===t.id ? {...x, text, rank, deadline} : x);
  save(); render();
}

function getColor(r){
  if(r==="A") return "#ff3b30";
  if(r==="B") return "#ff9500";
  if(r==="C") return "#007aff";
  return "#999";
}

// 🔥 衝突回避（グリッド＋中央寄せ）
function placeBubbles(items){
  let cols = Math.ceil(Math.sqrt(items.length));
  let gap = 100;

  return items.map((t,i)=>{
    let row = Math.floor(i / cols);
    let col = i % cols;

    let size = 60 + (t.rank==="A"?60:t.rank==="B"?40:20);

    return {
      x: col * gap + 20,
      y: row * gap + 20,
      size,
      task:t
    };
  });
}

function render(){
  let bubbleArea = document.getElementById("bubbleArea");
  let list = document.getElementById("list");

  bubbleArea.innerHTML="";
  list.innerHTML="";

  if(mode==="active"){
    let items = tasks.filter(t=>!t.done);
    let placed = placeBubbles(items);

    placed.forEach(p=>{
      let div=document.createElement("div");
      div.className="bubble";
      div.style.width=p.size+"px";
      div.style.height=p.size+"px";
      div.style.left=p.x+"px";
      div.style.top=p.y+"px";
      div.style.background=getColor(p.task.rank);
      div.style.fontSize=Math.min(p.size/5,18)+"px";

      div.innerText=p.task.text;
      div.onclick=()=>edit(p.task);

      bubbleArea.appendChild(div);
    });

    bubbleArea.style.display="block";
    list.style.display="none";
  }

  if(mode==="done"){
    tasks.filter(t=>t.done).forEach(t=>{
      let div=document.createElement("div");
      div.className="card rank"+t.rank;

      div.innerHTML=`
        <div>${t.text}</div>
        <div>
          ${t.deadline?`<div class="badge">${t.deadline}</div>`:""}
          <button onclick="toggle(${t.id})">戻す</button>
          <button onclick="del(${t.id})">削除</button>
        </div>
      `;

      div.onclick=()=>edit(t);

      list.appendChild(div);
    });

    bubbleArea.style.display="none";
    list.style.display="block";
  }
}

render();
</script>

</body>
</html>
