<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.header {
  padding: 20px;
  font-size: 22px;
  color: white;
}

.tabs {
  display: flex;
  margin: 10px;
}

.tabs button {
  flex:1;
  padding:12px;
  border:none;
  background:white;
  border-radius:10px;
  margin:4px;
}

.active {
  background:black;
  color:white;
}

.container {
  padding: 12px;
}

/* バブル */
.bubbleArea {
  position:relative;
  height:420px;
}

.bubble {
  position:absolute;
  border-radius:50%;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6px;
  font-weight:bold;
  transition: transform 0.2s;
  touch-action:none;
}

/* リスト */
.card {
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.done {
  opacity:0.4;
}

.status {
  font-size:12px;
  padding:4px 8px;
  border-radius:8px;
}

.activeStatus {
  background:#d1fae5;
}

.doneStatus {
  background:#e5e7eb;
}

/* ボタン */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:black;
  color:white;
  border-radius:50%;
  font-size:28px;
  text-align:center;
  line-height:60px;
}
</style>
</head>

<body>

<div class="header">Todo</div>

<div class="tabs">
  <button onclick="setMode('bubble')" id="btnBubble" class="active">未完了</button>
  <button onclick="setMode('list')" id="btnList">リスト</button>
</div>

<div class="container">
  <div id="bubbleArea" class="bubbleArea"></div>
  <div id="list"></div>
</div>

<div class="fab" onclick="addTask()">＋</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let mode="bubble";

function save(){ localStorage.setItem("tasks", JSON.stringify(tasks)); }

function setMode(m){
  mode=m;
  btnBubble.classList.toggle("active",m==="bubble");
  btnList.classList.toggle("active",m==="list");
  render();
}

function addTask(){
  let text=prompt("タスク名");
  if(!text) return;
  tasks.push({id:Date.now(),text,done:false});
  save(); render();
}

/* バブル配置 */
function placeBubbles(items){
  return items.map((t,i)=>({
    x:(i%3)*110,
    y:Math.floor(i/3)*110,
    size:80,
    task:t
  }));
}

function render(){
  bubbleArea.innerHTML="";
  list.innerHTML="";

  if(mode==="bubble"){
    let active=tasks.filter(t=>!t.done);
    let placed=placeBubbles(active);

    placed.forEach(p=>{
      let div=document.createElement("div");
      div.className="bubble";
      div.style.width=p.size+"px";
      div.style.height=p.size+"px";
      div.style.left=p.x+"px";
      div.style.top=p.y+"px";
      div.style.background="#ff3b30";

      div.innerText=p.task.text;

      let startX,startY;
      let dragging=false;

      div.addEventListener("touchstart",e=>{
        startX=e.touches[0].clientX;
        startY=e.touches[0].clientY;
      });

      div.addEventListener("touchmove",e=>{
        dragging=true;
        let dx=e.touches[0].clientX-startX;
        let dy=e.touches[0].clientY-startY;
        div.style.transform=`translate(${dx}px, ${dy}px)`;
      });

      div.addEventListener("touchend",e=>{
        if(!dragging){
          return;
        }

        let dx=e.changedTouches[0].clientX-startX;
        let dy=e.changedTouches[0].clientY-startY;

        // 一定距離以上で完了
        if(Math.abs(dx)>120 || Math.abs(dy)>120){
          div.style.transform="translate(500px, -500px)";
          setTimeout(()=>{
            p.task.done=true;
            save(); render();
          },200);
        }else{
          // 戻るアニメーション
          div.style.transform="translate(0,0)";
        }

        dragging=false;
      });

      bubbleArea.appendChild(div);
    });

    bubbleArea.style.display="block";
    list.style.display="none";
  }

  if(mode==="list"){
    tasks.forEach(t=>{
      let div=document.createElement("div");
      div.className="card "+(t.done?"done":"");

      div.innerHTML=`
        <div>${t.text}</div>
        <div class="status ${t.done?"doneStatus":"activeStatus"}">
          ${t.done?"完了":"未完了"}
        </div>
      `;

      list.appendChild(div);
    });

    bubbleArea.style.display="none";
    list.style.display="block";
  }
}

render();
</script>

</body>
</html>
