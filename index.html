<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.header {
  padding: 20px;
  font-size: 22px;
  color: white;
}

.tabs {
  display: flex;
  margin: 10px;
}

.tabs button {
  flex:1;
  padding:12px;
  border:none;
  background:white;
  border-radius:10px;
  margin:4px;
}

.active {
  background:black;
  color:white;
}

.container {
  padding: 12px;
}

/* バブル */
.bubbleArea {
  position:relative;
  height:420px;
}

.bubble {
  position:absolute;
  border-radius:50%;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6px;
  font-weight:bold;
  word-break:break-word;
  touch-action:none;
}

/* リスト */
.card {
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition: transform 0.2s;
}

.badge {
  font-size:12px;
  background:#eee;
  padding:4px 8px;
  border-radius:8px;
}

.rankA { border-left:6px solid #ff3b30; }
.rankB { border-left:6px solid #ff9500; }
.rankC { border-left:6px solid #007aff; }

/* ボタン */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:black;
  color:white;
  border-radius:50%;
  font-size:28px;
  text-align:center;
  line-height:60px;
}

/* モーダル */
.modal {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:16px;
  border-radius:16px 16px 0 0;
  display:none;
}

.rankSelect div {
  margin:8px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}
.selected {
  background:#ddd;
}
</style>
</head>

<body>

<div class="header">Todo</div>

<div class="tabs">
  <button onclick="setMode('bubble')" id="btnBubble" class="active">未完了</button>
  <button onclick="setMode('list')" id="btnList">リスト</button>
</div>

<div class="container">
  <div id="bubbleArea" class="bubbleArea"></div>
  <div id="list"></div>
</div>

<div class="fab" onclick="openModal()">＋</div>

<div id="modal" class="modal">
  <input id="text" placeholder="タスク名">

  <div class="rankSelect">
    <div onclick="setRank('A')" id="rA">🔴 高（A）</div>
    <div onclick="setRank('B')" id="rB">🟡 中（B）</div>
    <div onclick="setRank('C')" id="rC">🔵 低（C）</div>
  </div>

  <input type="date" id="date">

  <button onclick="saveTask()">保存</button>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let mode="bubble";
let selectedRank="";
let editing=null;

function save(){ localStorage.setItem("tasks", JSON.stringify(tasks)); }

function setMode(m){
  mode=m;
  btnBubble.classList.toggle("active",m==="bubble");
  btnList.classList.toggle("active",m==="list");
  render();
}

function openModal(t=null){
  modal.style.display="block";
  if(t){
    editing=t.id;
    text.value=t.text;
    date.value=t.deadline;
    setRank(t.rank);
  }
}

function setRank(r){
  selectedRank=r;
  ["A","B","C"].forEach(x=>{
    document.getElementById("r"+x).classList.toggle("selected",x===r);
  });
}

function saveTask(){
  let t=text.value;
  let d=date.value;

  if(editing){
    tasks=tasks.map(x=>x.id===editing?{...x,text:t,rank:selectedRank,deadline:d}:x);
    editing=null;
  }else{
    tasks.push({id:Date.now(),text:t,rank:selectedRank,deadline:d,done:false});
  }

  modal.style.display="none";
  save(); render();
}

function getScore(t){
  let s = t.rank==="A"?3:t.rank==="B"?2:1;
  if(t.deadline){
    let d=(new Date(t.deadline)-new Date())/(1000*60*60*24);
    s += Math.max(0,5-d);
  }
  return s;
}

function getColor(r){
  return r==="A"?"#ff3b30":r==="B"?"#ff9500":"#007aff";
}

/* バブル配置（上に重要） */
function placeBubbles(items){
  let cols=3;
  let gap=110;

  return items.map((t,i)=>{
    let size=Math.min(120,60+getScore(t)*20);
    return {
      x:(i%cols)*gap,
      y:Math.floor(i/cols)*gap,
      size,
      task:t
    };
  });
}

function render(){
  bubbleArea.innerHTML="";
  list.innerHTML="";

  let active = tasks.filter(t=>!t.done)
    .sort((a,b)=>getScore(b)-getScore(a));

  if(mode==="bubble"){
    let placed=placeBubbles(active);

    placed.forEach(p=>{
      let div=document.createElement("div");
      div.className="bubble";

      div.style.width=p.size+"px";
      div.style.height=p.size+"px";
      div.style.left=p.x+"px";
      div.style.top=p.y+"px";
      div.style.background=getColor(p.task.rank);

      div.innerText=p.task.text;

      // ドラッグで完了
      let startX, startY;
      div.addEventListener("touchstart",e=>{
        startX=e.touches[0].clientX;
        startY=e.touches[0].clientY;
      });

      div.addEventListener("touchend",e=>{
        let dx=e.changedTouches[0].clientX-startX;
        let dy=e.changedTouches[0].clientY-startY;

        if(Math.abs(dx)>80 || Math.abs(dy)>80){
          p.task.done=true;
          save(); render();
        }else{
          openModal(p.task);
        }
      });

      bubbleArea.appendChild(div);
    });

    bubbleArea.style.display="block";
    list.style.display="none";
  }

  if(mode==="list"){
    tasks.forEach(t=>{
      let div=document.createElement("div");
      div.className="card rank"+t.rank;

      div.innerHTML=`
        <div>${t.text}</div>
        <div>${t.deadline||""}</div>
      `;

      // スワイプ
      let start=0;
      div.addEventListener("touchstart",e=>start=e.touches[0].clientX);
      div.addEventListener("touchend",e=>{
        let diff=e.changedTouches[0].clientX-start;
        if(diff>80){ t.done=true; save(); render(); }
        if(diff<-80){ tasks=tasks.filter(x=>x.id!==t.id); save(); render(); }
      });

      div.onclick=()=>openModal(t);

      list.appendChild(div);
    });

    bubbleArea.style.display="none";
    list.style.display="block";
  }
}

render();
</script>

</body>
</html>
