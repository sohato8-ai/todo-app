<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.header {
  padding: 20px;
  font-size: 22px;
  color: white;
}

.tabs {
  display: flex;
  margin: 10px;
}

.tabs button {
  flex:1;
  padding:12px;
  border:none;
  background:white;
  border-radius:10px;
  margin:4px;
}

.active {
  background:#000;
  color:white;
}

.container {
  padding: 12px;
}

.bubbleArea {
  position:relative;
  height:420px;
}

.bubble {
  position:absolute;
  border-radius:50%;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6px;
  font-weight:bold;
}

.card {
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

.badge {
  font-size:12px;
  background:#eee;
  padding:4px 8px;
  border-radius:8px;
}

.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:black;
  color:white;
  border-radius:50%;
  font-size:28px;
  text-align:center;
  line-height:60px;
}

/* モーダル */
.modal {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:16px;
  border-radius:16px 16px 0 0;
  display:none;
}

.rankSelect span {
  font-size:24px;
  margin:10px;
  cursor:pointer;
}

.selected {
  transform: scale(1.3);
}
</style>
</head>

<body>

<div class="header">Todo</div>

<div class="tabs">
  <button id="btnActive" onclick="setMode('active')" class="active">未完了</button>
  <button id="btnDone" onclick="setMode('done')">完了</button>
</div>

<div class="container">
  <div id="bubbleArea" class="bubbleArea"></div>
  <div id="list"></div>
</div>

<div class="fab" onclick="openModal()">＋</div>

<div id="modal" class="modal">
  <input id="text" placeholder="タスク名">

  <div class="rankSelect">
    <span onclick="setRank('A')" id="rA">🔴</span>
    <span onclick="setRank('B')" id="rB">🟡</span>
    <span onclick="setRank('C')" id="rC">🔵</span>
  </div>

  <input type="date" id="date">

  <button onclick="saveTask()">保存</button>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let mode="active";
let editing=null;
let selectedRank="";

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function setMode(m){
  mode=m;
  btnActive.classList.toggle("active",m==="active");
  btnDone.classList.toggle("active",m==="done");
  render();
}

function openModal(t=null){
  modal.style.display="block";
  if(t){
    editing=t.id;
    text.value=t.text;
    date.value=t.deadline;
    selectedRank=t.rank;
  }
}

function setRank(r){
  selectedRank=r;
  ["A","B","C"].forEach(x=>{
    document.getElementById("r"+x).classList.toggle("selected",x===r);
  });
}

function saveTask(){
  let t=text.value;
  let d=date.value;

  if(editing){
    tasks=tasks.map(x=>x.id===editing?{...x,text:t,rank:selectedRank,deadline:d}:x);
    editing=null;
  }else{
    tasks.push({id:Date.now(),text:t,rank:selectedRank,deadline:d,done:false});
  }

  modal.style.display="none";
  save(); render();
}

function getScore(t){
  let s=0;
  if(t.rank==="A")s+=3;
  if(t.rank==="B")s+=2;
  if(t.rank==="C")s+=1;

  if(t.deadline){
    let d=(new Date(t.deadline)-new Date())/(1000*60*60*24);
    s+=Math.max(0,5-d);
  }
  return s;
}

function getColor(r){
  return r==="A"?"#ff3b30":r==="B"?"#ff9500":"#007aff";
}

function render(){
  bubbleArea.innerHTML="";
  list.innerHTML="";

  if(mode==="active"){
    let sorted=[...tasks.filter(t=>!t.done)]
      .sort((a,b)=>getScore(b)-getScore(a));

    sorted.forEach((t,i)=>{
      let size=60+getScore(t)*20;

      let div=document.createElement("div");
      div.className="bubble";

      div.style.width=size+"px";
      div.style.height=size+"px";
      div.style.left=(i%3)*110+"px";
      div.style.top=Math.floor(i/3)*110+"px";
      div.style.background=getColor(t.rank);
      div.style.fontSize=Math.min(size/5,18)+"px";

      div.innerText=t.text;
      div.onclick=()=>openModal(t);

      bubbleArea.appendChild(div);
    });

    bubbleArea.style.display="block";
    list.style.display="none";
  }

  if(mode==="done"){
    tasks.filter(t=>t.done).forEach(t=>{
      let div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <div>${t.text}</div>
        <div>
          ${t.deadline?`<div class="badge">${t.deadline}</div>`:""}
        </div>
      `;

      list.appendChild(div);
    });

    bubbleArea.style.display="none";
    list.style.display="block";
  }
}

render();
</script>

</body>
</html>
