<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.header {
  padding: 20px;
  font-size: 22px;
  color: white;
}

.tabs {
  display: flex;
  margin: 10px;
}

.tabs button {
  flex:1;
  padding:12px;
  border:none;
  background:white;
  border-radius:10px;
  margin:4px;
}

.active {
  background:black;
  color:white;
}

.container {
  padding: 12px;
}

/* バブル */
.bubbleArea {
  position:relative;
  height:420px;
}

.bubble {
  position:absolute;
  border-radius:50%;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6px;
  font-weight:bold;
  word-break:break-word;
}

/* リスト */
.card {
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge {
  font-size:12px;
  background:#eee;
  padding:4px 8px;
  border-radius:8px;
}

.rankA { border-left:6px solid #ff3b30; }
.rankB { border-left:6px solid #ff9500; }
.rankC { border-left:6px solid #007aff; }

/* ボタン */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:black;
  color:white;
  border-radius:50%;
  font-size:28px;
  text-align:center;
  line-height:60px;
}

/* モーダル */
.modal {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:16px;
  border-radius:16px 16px 0 0;
  display:none;
}

.rankSelect span {
  font-size:24px;
  margin:10px;
  cursor:pointer;
}

.selected {
  transform: scale(1.3);
}
</style>
</head>

<body>

<div class="header">Todo</div>

<div class="tabs">
  <button onclick="setMode('bubble')" id="btnBubble" class="active">バブル</button>
  <button onclick="setMode('list')" id="btnList">リスト</button>
</div>

<div class="container">
  <div id="bubbleArea" class="bubbleArea"></div>
  <div id="list"></div>
</div>

<div class="fab" onclick="openModal()">＋</div>

<div id="modal" class="modal">
  <input id="text" placeholder="タスク名">

  <div class="rankSelect">
    <span onclick="setRank('A')" id="rA">🔴</span>
    <span onclick="setRank('B')" id="rB">🟡</span>
    <span onclick="setRank('C')" id="rC">🔵</span>
  </div>

  <input type="date" id="date">

  <button onclick="saveTask()">保存</button>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let mode="bubble";
let selectedRank="";
let editing=null;

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function setMode(m){
  mode=m;
  btnBubble.classList.toggle("active",m==="bubble");
  btnList.classList.toggle("active",m==="list");
  render();
}

function openModal(t=null){
  modal.style.display="block";
  if(t){
    editing=t.id;
    text.value=t.text;
    date.value=t.deadline;
    selectedRank=t.rank;
  }
}

function setRank(r){
  selectedRank=r;
  ["A","B","C"].forEach(x=>{
    document.getElementById("r"+x).classList.toggle("selected",x===r);
  });
}

function saveTask(){
  let t=text.value;
  let d=date.value;

  if(editing){
    tasks=tasks.map(x=>x.id===editing?{...x,text:t,rank:selectedRank,deadline:d}:x);
    editing=null;
  }else{
    tasks.push({id:Date.now(),text:t,rank:selectedRank,deadline:d,done:false});
  }

  modal.style.display="none";
  save(); render();
}

function toggle(id){
  tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
  save(); render();
}

function del(id){
  if(confirm("削除する？")){
    tasks = tasks.filter(t => t.id!==id);
    save(); render();
  }
}

function getScore(t){
  let s = t.rank==="A"?3:t.rank==="B"?2:1;
  if(t.deadline){
    let d=(new Date(t.deadline)-new Date())/(1000*60*60*24);
    s += Math.max(0,5-d);
  }
  return s;
}

function getColor(r){
  return r==="A"?"#ff3b30":r==="B"?"#ff9500":"#007aff";
}

/* 🔥 衝突回避 */
function placeBubbles(items){
  let placed=[];

  items.forEach(t=>{
    let size=60+getScore(t)*20;
    let x,y,tries=0;

    do{
      x=Math.random()*300;
      y=Math.random()*350;
      tries++;
    }while(placed.some(p=>{
      let dx=p.x-x;
      let dy=p.y-y;
      return Math.sqrt(dx*dx+dy*dy)<(p.size+size)/2;
    }) && tries<100);

    placed.push({x,y,size,task:t});
  });

  return placed;
}

function render(){
  bubbleArea.innerHTML="";
  list.innerHTML="";

  let activeTasks = tasks.filter(t=>!t.done);
  let sorted = [...activeTasks].sort((a,b)=>{
    if(getScore(b)!==getScore(a)) return getScore(b)-getScore(a);
    return new Date(a.deadline||"9999") - new Date(b.deadline||"9999");
  });

  if(mode==="bubble"){
    let placed = placeBubbles(sorted);

    placed.forEach(p=>{
      let div=document.createElement("div");
      div.className="bubble";
      div.style.width=p.size+"px";
      div.style.height=p.size+"px";
      div.style.left=p.x+"px";
      div.style.top=p.y+"px";
      div.style.background=getColor(p.task.rank);
      div.style.fontSize=Math.min(p.size/5,18)+"px";

      div.innerText=p.task.text;
      div.onclick=()=>openModal(p.task);

      bubbleArea.appendChild(div);
    });

    bubbleArea.style.display="block";
    list.style.display="none";
  }

  if(mode==="list"){
    sorted.forEach(t=>{
      let div=document.createElement("div");
      div.className="card rank"+t.rank;

      div.innerHTML=`
        <div>${t.text}</div>
        <div>
          ${t.deadline?`<div class="badge">${t.deadline}</div>`:""}
          <button onclick="toggle(${t.id})">完了</button>
        </div>
      `;

      list.appendChild(div);
    });

    tasks.filter(t=>t.done).forEach(t=>{
      let div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <div style="opacity:0.5">${t.text}</div>
        <div>
          <button onclick="toggle(${t.id})">戻す</button>
          <button onclick="del(${t.id})">削除</button>
        </div>
      `;

      list.appendChild(div);
    });

    bubbleArea.style.display="none";
    list.style.display="block";
  }
}

render();
</script>

</body>
</html>
