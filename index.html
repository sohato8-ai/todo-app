<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f5f7;
}

.header {
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 12px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: transform 0.2s;
}

.card:active {
  transform: scale(0.98);
}

.done {
  text-decoration: line-through;
  opacity: 0.5;
}

.rankA { border-left: 6px solid #ff3b30; }
.rankB { border-left: 6px solid #ffcc00; }
.rankC { border-left: 6px solid #007aff; }

.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: black;
  color: white;
  border-radius: 50%;
  font-size: 30px;
  text-align: center;
  line-height: 60px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  padding: 16px;
  border-radius: 16px 16px 0 0;
  display: none;
}

.bubbleView {
  display:none;
  position:relative;
  height:500px;
}

.bubble {
  position:absolute;
  border-radius:50%;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
}

.tabs {
  display:flex;
  justify-content:space-around;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">Todo</div>

<div class="tabs">
  <button onclick="setView('list')">リスト</button>
  <button onclick="setView('bubble')">バブル</button>
</div>

<div id="listView" class="container"></div>
<div id="bubbleView" class="bubbleView"></div>

<div class="fab" onclick="openModal()">＋</div>

<div id="modal" class="modal">
  <input id="text" placeholder="タスク">
  <select id="rank">
    <option value="">ランクなし</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
  </select>
  <input type="date" id="deadline">
  <button onclick="addTask()">追加</button>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let view = "list";

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function getScore(t){
  let s=0;
  if(t.rank==="A")s+=3;
  if(t.rank==="B")s+=2;
  if(t.rank==="C")s+=1;
  if(t.deadline){
    let d=(new Date(t.deadline)-new Date())/(1000*60*60*24);
    s+=Math.max(0,5-d);
  }
  return s;
}

function getColor(r){
  if(r==="A")return "#ff3b30";
  if(r==="B")return "#ffcc00";
  if(r==="C")return "#007aff";
  return "#999";
}

function openModal(){
  document.getElementById("modal").style.display="block";
}

function addTask(){
  let text=document.getElementById("text").value;
  let rank=document.getElementById("rank").value;
  let deadline=document.getElementById("deadline").value;
  if(!text)return;

  tasks.push({id:Date.now(),text,rank,deadline,done:false});
  save();
  render();
  document.getElementById("modal").style.display="none";
}

function toggle(id){
  tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  save();render();
}

function del(id){
  tasks=tasks.filter(t=>t.id!==id);
  save();render();
}

function render(){
  renderList();
  renderBubble();
}

function renderList(){
  let el=document.getElementById("listView");
  el.innerHTML="";

  tasks.forEach(t=>{
    let div=document.createElement("div");
    div.className=`card rank${t.rank}`;

    div.innerHTML=`
      <div class="${t.done?"done":""}">
        ${t.text}<br>
        ${t.deadline||""}
      </div>
      <div>
        <input type="checkbox" ${t.done?"checked":""} onclick="toggle(${t.id})">
      </div>
    `;

    // スワイプ削除
    let startX=0;
    div.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
    div.addEventListener("touchend",e=>{
      let diff=e.changedTouches[0].clientX-startX;
      if(diff>80) del(t.id);
    });

    el.appendChild(div);
  });
}

function renderBubble(){
  let el=document.getElementById("bubbleView");
  el.innerHTML="";
  let sorted=[...tasks].sort((a,b)=>getScore(b)-getScore(a));

  sorted.forEach((t,i)=>{
    let size=60+getScore(t)*20;
    let div=document.createElement("div");
    div.className="bubble";
    div.style.width=size+"px";
    div.style.height=size+"px";
    div.style.top=(Math.floor(i/3)*120+20)+"px";
    div.style.left=((i%3)*120+20)+"px";
    div.style.background=getColor(t.rank);
    div.style.opacity=t.done?0.3:1;
    div.innerText=t.text;
    el.appendChild(div);
  });
}

function setView(v){
  view = v;
  document.getElementById("listView").style.display = v === "list" ? "block" : "none";
  document.getElementById("bubbleView").style.display = v === "bubble" ? "block" : "none";
}

render();
</script>

</body>
</html>
