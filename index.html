<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.header {
  padding: 20px;
  font-size: 22px;
  color: white;
}

.tabs {
  display: flex;
  margin: 10px;
}

.tabs button {
  flex:1;
  padding:12px;
  border:none;
  background:white;
  border-radius:10px;
  margin:4px;
}

.active {
  background:black;
  color:white;
}

.container {
  padding: 12px;
}

.bubbleArea {
  position:relative;
  height:420px;
}

.bubble {
  position:absolute;
  border-radius:50%;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6px;
  font-weight:bold;
  word-break:break-word;
}

/* リスト */
.card {
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition: transform 0.2s;
}

.badge {
  font-size:12px;
  background:#eee;
  padding:4px 8px;
  border-radius:8px;
}

.rankA { border-left:6px solid #ff3b30; }
.rankB { border-left:6px solid #ff9500; }
.rankC { border-left:6px solid #007aff; }

.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  background:black;
  color:white;
  border-radius:50%;
  font-size:28px;
  text-align:center;
  line-height:60px;
}

/* モーダル */
.modal {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:16px;
  border-radius:16px 16px 0 0;
  display:none;
}

.rankSelect div {
  margin:8px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}
.selected {
  background:#ddd;
}
</style>
</head>

<body>

<div class="header">Todo</div>

<div class="tabs">
  <button onclick="setMode('bubble')" id="btnBubble" class="active">バブル</button>
  <button onclick="setMode('list')" id="btnList">リスト</button>
</div>

<div class="container">
  <div id="bubbleArea" class="bubbleArea"></div>
  <div id="list"></div>
</div>

<div class="fab" onclick="openModal()">＋</div>

<div id="modal" class="modal">
  <input id="text" placeholder="タスク名">

  <div class="rankSelect">
    <div onclick="setRank('A')" id="rA">🔴 高（A）</div>
    <div onclick="setRank('B')" id="rB">🟡 中（B）</div>
    <div onclick="setRank('C')" id="rC">🔵 低（C）</div>
  </div>

  <input type="date" id="date">

  <button onclick="saveTask()">保存</button>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let mode="bubble";
let selectedRank="";
let editing=null;

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function setMode(m){
  mode=m;
  btnBubble.classList.toggle("active",m==="bubble");
  btnList.classList.toggle("active",m==="list");
  render();
}

function openModal(t=null){
  modal.style.display="block";

  if(t){
    editing=t.id;
    text.value=t.text;
    date.value=t.deadline;
    setRank(t.rank);
  }
}

function setRank(r){
  selectedRank=r;
  ["A","B","C"].forEach(x=>{
    document.getElementById("r"+x).classList.toggle("selected",x===r);
  });
}

function saveTask(){
  let t=text.value;
  let d=date.value;

  if(editing){
    tasks=tasks.map(x=>x.id===editing?{...x,text:t,rank:selectedRank,deadline:d}:x);
    editing=null;
  }else{
    tasks.push({id:Date.now(),text:t,rank:selectedRank,deadline:d,done:false});
  }

  modal.style.display="none";
  save(); render();
}

function del(id){
  if(confirm("削除する？")){
    tasks = tasks.filter(t => t.id!==id);
    save(); render();
  }
}

function getScore(t){
  let s = t.rank==="A"?3:t.rank==="B"?2:1;
  if(t.deadline){
    let d=(new Date(t.deadline)-new Date())/(1000*60*60*24);
    s += Math.max(0,5-d);
  }
  return s;
}

function getColor(r){
  return r==="A"?"#ff3b30":r==="B"?"#ff9500":"#007aff";
}

/* 衝突回避＋画面内制御 */
function placeBubbles(items){
  let placed=[];
  let maxWidth=window.innerWidth-100;

  items.forEach(t=>{
    let size=Math.min(120,60+getScore(t)*20);
    let x,y,tries=0;

    do{
      x=Math.random()*maxWidth;
      y=Math.random()*320;
      tries++;
    }while(placed.some(p=>{
      let dx=p.x-x;
      let dy=p.y-y;
      return Math.sqrt(dx*dx+dy*dy)<(p.size+size)/2;
    }) && tries<100);

    placed.push({x,y,size,task:t});
  });

  return placed;
}

function render(){
  bubbleArea.innerHTML="";
  list.innerHTML="";

  let activeTasks=tasks.filter(t=>!t.done)
    .sort((a,b)=>getScore(b)-getScore(a));

  if(mode==="bubble"){
    let placed=placeBubbles(activeTasks);

    placed.forEach(p=>{
      let div=document.createElement("div");
      div.className="bubble";

      div.style.width=p.size+"px";
      div.style.height=p.size+"px";
      div.style.left=p.x+"px";
      div.style.top=p.y+"px";
      div.style.background=getColor(p.task.rank);

      div.innerText=p.task.text;
      div.onclick=()=>openModal(p.task);

      bubbleArea.appendChild(div);
    });

    bubbleArea.style.display="block";
    list.style.display="none";
  }

  if(mode==="list"){
    activeTasks.forEach(t=>{
      let div=document.createElement("div");
      div.className="card rank"+t.rank;

      div.innerHTML=`
        <div>${t.text}</div>
        <div>
          ${t.deadline?`<div class="badge">${t.deadline}</div>`:""}
        </div>
      `;

      // タップで編集
      div.onclick=()=>openModal(t);

      // スワイプ削除
      let start=0;
      div.addEventListener("touchstart",e=>start=e.touches[0].clientX);
      div.addEventListener("touchend",e=>{
        if(e.changedTouches[0].clientX-start>80){
          del(t.id);
        }
      });

      list.appendChild(div);
    });

    bubbleArea.style.display="none";
    list.style.display="block";
  }
}

render();
</script>

</body>
</html>
