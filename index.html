<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.header {
  padding: 20px;
  font-size: 22px;
  color: white;
}

.container {
  padding: 12px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;

  white-space: normal;
  word-break: break-word;
}

.done {
  text-decoration: line-through;
  opacity: 0.4;
}

.rankA { border-left: 6px solid #ff3b30; }
.rankB { border-left: 6px solid #ff9500; }
.rankC { border-left: 6px solid #007aff; }

.badge {
  font-size: 12px;
  background: #eee;
  padding: 4px 8px;
  border-radius: 8px;
}

.bubbleArea {
  position: relative;
  height: 400px;
}

.bubble {
  position: absolute;
  border-radius: 50%;
  color: white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6px;
  font-weight:bold;
  word-break:break-word;
}

.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: black;
  color: white;
  border-radius: 50%;
  font-size: 28px;
  text-align: center;
  line-height: 60px;
}

input, select {
  margin: 4px;
}
</style>
</head>

<body>

<div class="header">Todo</div>

<div class="container">
  <h3 style="color:white;">未完了（優先タスク）</h3>
  <div id="bubbleArea" class="bubbleArea"></div>

  <h3 style="color:white;">完了タスク</h3>
  <div id="list"></div>
</div>

<div class="fab" onclick="addTask()">＋</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask(){
  let text = prompt("タスク名");
  if(!text) return;
  let rank = prompt("ランク A/B/C") || "";
  let deadline = prompt("期限 YYYY-MM-DD") || "";

  tasks.push({id:Date.now(), text, rank, deadline, done:false});
  save(); render();
}

function toggle(id){
  tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
  save(); render();
}

function del(id){
  tasks = tasks.filter(t => t.id!==id);
  save(); render();
}

function edit(t){
  let text = prompt("タスク名", t.text);
  let rank = prompt("ランク", t.rank);
  let deadline = prompt("期限", t.deadline);

  tasks = tasks.map(x => x.id===t.id ? {...x, text, rank, deadline} : x);
  save(); render();
}

function getColor(r){
  if(r==="A") return "#ff3b30";
  if(r==="B") return "#ff9500";
  if(r==="C") return "#007aff";
  return "#999";
}

function render(){
  renderBubble();
  renderList();
}

// 衝突回避
function placeBubbles(items){
  let placed = [];

  items.forEach(t=>{
    let size = 60 + (t.rank==="A"?60:t.rank==="B"?40:20);

    let x,y,tries=0;
    do{
      x = Math.random()*300;
      y = Math.random()*300;
      tries++;
    }while(placed.some(p=>{
      let dx=p.x-x;
      let dy=p.y-y;
      return Math.sqrt(dx*dx+dy*dy) < (p.size+size)/2;
    }) && tries<100);

    placed.push({x,y,size,task:t});
  });

  return placed;
}

function renderBubble(){
  let el = document.getElementById("bubbleArea");
  el.innerHTML="";

  let items = tasks.filter(t=>!t.done);
  let placed = placeBubbles(items);

  placed.forEach(p=>{
    let div=document.createElement("div");
    div.className="bubble";
    div.style.width=p.size+"px";
    div.style.height=p.size+"px";
    div.style.left=p.x+"px";
    div.style.top=p.y+"px";
    div.style.background=getColor(p.task.rank);
    div.style.fontSize=Math.min(p.size/5,18)+"px";

    div.innerText=p.task.text;

    div.onclick=()=>edit(p.task);

    el.appendChild(div);
  });
}

function renderList(){
  let el=document.getElementById("list");
  el.innerHTML="";

  tasks.filter(t=>t.done).forEach(t=>{
    let div=document.createElement("div");
    div.className="card rank"+t.rank;

    div.innerHTML=`
      <div class="done">${t.text}</div>
      <div>
        ${t.deadline?`<div class="badge">${t.deadline}</div>`:""}
        <button onclick="toggle(${t.id})">戻す</button>
        <button onclick="del(${t.id})">削除</button>
      </div>
    `;

    div.onclick=()=>edit(t);

    el.appendChild(div);
  });
}

render();
</script>

</body>
</html>
